name: EasyTier GUI

on:
  workflow_dispatch:
  push:
    branches: ["develop", "main", "releases/**"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'easytier/docs/**'
  pull_request:
    branches: ["develop", "main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  pre_job:
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip == 'true' && !startsWith(github.ref_name, 'releases/') }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: 'same_content_newer'
          skip_after_successful_duplicate: 'true'
          cancel_others: 'true'
          paths: '["Cargo.toml", "Cargo.lock", "easytier/**", "easytier-policy/**", "easytier-socks-egress/**", "third_party/**", "scripts/build-hev-socks-egress.sh", "easytier-gui/**", ".github/workflows/gui.yml", ".github/actions/**", "easytier-web/frontend-lib/**"]'
  build-gui:
    strategy:
      fail-fast: true
      matrix:
        include:
          - TARGET: x86_64-unknown-linux-musl
            OS: ubuntu-24.04
            GUI_TARGET: x86_64-unknown-linux-gnu
            ARTIFACT_NAME: linux-x86_64
          - TARGET: aarch64-unknown-linux-musl
            OS: ubuntu-24.04-arm
            GUI_TARGET: aarch64-unknown-linux-gnu
            ARTIFACT_NAME: linux-aarch64

          - TARGET: x86_64-apple-darwin
            OS: macos-latest
            GUI_TARGET: x86_64-apple-darwin
            ARTIFACT_NAME: macos-x86_64
          - TARGET: aarch64-apple-darwin
            OS: macos-latest
            GUI_TARGET: aarch64-apple-darwin
            ARTIFACT_NAME: macos-aarch64

          - TARGET: x86_64-pc-windows-msvc
            OS: windows-latest
            GUI_TARGET: x86_64-pc-windows-msvc
            ARTIFACT_NAME: windows-x86_64
          - TARGET: i686-pc-windows-msvc
            OS: windows-latest
            GUI_TARGET: i686-pc-windows-msvc
            ARTIFACT_NAME: windows-i686
          - TARGET: aarch64-pc-windows-msvc
            OS: windows-11-arm
            GUI_TARGET: aarch64-pc-windows-msvc
            ARTIFACT_NAME: windows-arm64

    runs-on: ${{ matrix.OS }}
    env:
      NAME: easytier
      TARGET: ${{ matrix.TARGET }}
      OS: ${{ matrix.OS }}
      GUI_TARGET: ${{ matrix.GUI_TARGET }}
      OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Set current ref as env variable
        run: |
          echo "GIT_DESC=$(git log -1 --format=%cd.%h --date=format:%Y-%m-%d_%H:%M:%S)" >> $GITHUB_ENV

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          target: ${{ matrix.TARGET }}
          gui: true
          pnpm: true
          pnpm-build-filter: ''
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          # The prefix cache key, this can be changed to start a new cache manually.
          # default: "v0-rust"
          prefix-key: ""
          shared-key: "gui-registry"
          cache-targets: "false"

      - name: copy correct DLLs
        if: contains(matrix.GUI_TARGET, 'windows')
        run: |
          case $TARGET in
              x86_64*)  ARCH_DIR=x86_64 ;;
              i686*)    ARCH_DIR=i686 ;;
              aarch64*) ARCH_DIR=arm64 ;;
          esac
          if [[ -n "$ARCH_DIR" ]]; then
              find "./easytier/third_party/${ARCH_DIR}" -maxdepth 1 -type f \( -name "*.dll" -o -name "*.sys" \) -exec cp {} ./easytier-gui/src-tauri/ \;
              test -f ./easytier-gui/src-tauri/wintun.dll
          fi

      - name: Build policy sidecars
        if: contains(matrix.GUI_TARGET, 'darwin') || contains(matrix.GUI_TARGET, 'linux') || contains(matrix.GUI_TARGET, 'windows')
        env:
          HEV_SERVER_COMMIT: 97e74f1068bd924e740032382cdc94ca83741ae6
        run: |
          set -euo pipefail
          cargo build --locked --release --target "$GUI_TARGET" \
            --package easytier-policy --bin easytier-leaf-worker --features leaf-worker
          mkdir -p easytier-gui/src-tauri/binaries
          if [[ "$GUI_TARGET" == *windows* ]]; then
            SUFFIX=.exe
          else
            SUFFIX=""
          fi
          cp "target/$GUI_TARGET/release/easytier-leaf-worker$SUFFIX" \
            "easytier-gui/src-tauri/binaries/easytier-leaf-worker-$GUI_TARGET$SUFFIX"
          test -f "easytier-gui/src-tauri/binaries/easytier-leaf-worker-$GUI_TARGET$SUFFIX"
          if [[ "$GUI_TARGET" == *windows* ]]; then
            exit 0
          fi
          scripts/build-hev-socks-egress.sh "$GUI_TARGET" \
            "easytier-gui/src-tauri/binaries/easytier-hev-socks-egress-$GUI_TARGET"
          test -x "easytier-gui/src-tauri/binaries/easytier-leaf-worker-$GUI_TARGET"
          test -x "easytier-gui/src-tauri/binaries/easytier-hev-socks-egress-$GUI_TARGET"

      - name: Build GUI
        if: matrix.GUI_TARGET != ''
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./easytier-gui
          args: --verbose --target ${{ matrix.GUI_TARGET }} -- --locked

      - name: Verify bundled policy sidecars
        if: contains(matrix.GUI_TARGET, 'darwin') || contains(matrix.GUI_TARGET, 'linux')
        run: |
          set -euo pipefail
          if [[ "$GUI_TARGET" == *darwin* ]]; then
            app_dir=$(find "target/$GUI_TARGET/release/bundle/macos" -maxdepth 1 -type d -name '*.app' -print -quit)
            test -n "$app_dir"
            for executable in easytier-gui easytier-leaf-worker easytier-hev-socks-egress; do
              test -x "$app_dir/Contents/MacOS/$executable"
              codesign --verify --strict --verbose=2 "$app_dir/Contents/MacOS/$executable"
            done
            codesign --verify --deep --strict --verbose=2 "$app_dir"
          else
            deb_file=$(find "target/$GUI_TARGET/release/bundle/deb" -maxdepth 1 -type f -name '*.deb' -print -quit)
            test -n "$deb_file"
            extract_dir="$RUNNER_TEMP/easytier-gui-deb"
            mkdir -p "$extract_dir"
            dpkg-deb -x "$deb_file" "$extract_dir"
            for executable in easytier-leaf-worker easytier-hev-socks-egress; do
              bundled=$(find "$extract_dir" -type f -name "$executable" -print -quit)
              test -n "$bundled"
              test -x "$bundled"
            done
          fi

      - name: Verify Windows policy runtime payload
        if: contains(matrix.GUI_TARGET, 'windows')
        run: |
          set -euo pipefail
          installer=$(find "target/$GUI_TARGET/release/bundle/nsis" -maxdepth 1 -type f -name '*.exe' -print -quit)
          test -n "$installer"
          7z l "$installer" > "$RUNNER_TEMP/windows-installer-files.txt"
          grep -F "easytier-leaf-worker.exe" "$RUNNER_TEMP/windows-installer-files.txt"
          grep -F "wintun.dll" "$RUNNER_TEMP/windows-installer-files.txt"

      - name: Collect artifact
        run: |
          mkdir -p ./artifacts/objects/
          
          if [[ $GITHUB_REF_TYPE =~ ^tag$ ]]; then
            TAG=$GITHUB_REF_NAME
          else
            TAG=$GITHUB_SHA
          fi

          # copy gui bundle, gui is built without specific target
          if [[ $GUI_TARGET =~ windows ]]; then
              mv ./target/$GUI_TARGET/release/bundle/nsis/*.exe ./artifacts/objects/
          elif [[ $GUI_TARGET =~ darwin ]]; then
              mv ./target/$GUI_TARGET/release/bundle/dmg/*.dmg ./artifacts/objects/
          elif [[ $GUI_TARGET =~ linux ]]; then
              mv ./target/$GUI_TARGET/release/bundle/deb/*.deb ./artifacts/objects/
              mv ./target/$GUI_TARGET/release/bundle/rpm/*.rpm ./artifacts/objects/
              mv ./target/$GUI_TARGET/release/bundle/appimage/*.AppImage ./artifacts/objects/
          fi

          mv ./artifacts/objects/* ./artifacts/
          rm -rf ./artifacts/objects/

      - name: Archive artifact
        uses: actions/upload-artifact@v5
        with:
          name: easytier-gui-${{ matrix.ARTIFACT_NAME }}
          path: |
            ./artifacts/*

  gui-result:
    runs-on: ubuntu-latest
    needs: [ pre_job, build-gui ]
    if: needs.pre_job.result == 'success' && needs.pre_job.outputs.should_skip != 'true' && !cancelled()
    steps:
      - name: Mark result as failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
