name: EasyTier GUI macOS ARM64 Test

on:
  workflow_dispatch:
  push:
    branches:
      - codex/gui-macos-arm64-test

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  build-gui-macos-arm64:
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
      GUI_TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - name: Set current ref as env variable
        run: |
          echo "GIT_DESC=$(git log -1 --format=%cd.%h --date=format:%Y-%m-%d_%H:%M:%S)" >> "$GITHUB_ENV"

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          target: ${{ env.TARGET }}
          gui: true
          pnpm: true
          pnpm-build-filter: ''
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: gui-test
          shared-key: macos-aarch64
          cache-targets: true
          cache-on-failure: true

      - name: Build policy sidecars
        env:
          HEV_SERVER_COMMIT: 97e74f1068bd924e740032382cdc94ca83741ae6
        run: |
          set -euo pipefail
          cargo build --locked --release --target "$GUI_TARGET" \
            --package easytier-policy --bin easytier-leaf-worker --features leaf-worker
          mkdir -p easytier-gui/src-tauri/binaries
          cp "target/$GUI_TARGET/release/easytier-leaf-worker" \
            "easytier-gui/src-tauri/binaries/easytier-leaf-worker-$GUI_TARGET"
          scripts/build-hev-socks-egress.sh "$GUI_TARGET" \
            "easytier-gui/src-tauri/binaries/easytier-hev-socks-egress-$GUI_TARGET"
          test -x "easytier-gui/src-tauri/binaries/easytier-leaf-worker-$GUI_TARGET"
          test -x "easytier-gui/src-tauri/binaries/easytier-hev-socks-egress-$GUI_TARGET"

      - name: Build GUI
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./easytier-gui
          args: --verbose --target ${{ env.GUI_TARGET }}

      - name: Verify signed policy sidecars
        run: |
          set -euo pipefail
          app_dir=$(find "target/$GUI_TARGET/release/bundle/macos" -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$app_dir"
          for executable in easytier-gui easytier-leaf-worker easytier-hev-socks-egress; do
            test -x "$app_dir/Contents/MacOS/$executable"
            codesign --verify --strict --verbose=2 "$app_dir/Contents/MacOS/$executable"
          done
          codesign --verify --deep --strict --verbose=2 "$app_dir"

      - name: Collect artifact
        run: |
          set -euo pipefail
          mkdir -p ./artifacts
          mv "./target/${GUI_TARGET}/release/bundle/dmg/"*.dmg ./artifacts/
          shasum -a 256 ./artifacts/* > ./artifacts/SHA256SUMS.txt
          ls -lh ./artifacts

      - name: Archive artifact
        uses: actions/upload-artifact@v5
        with:
          name: easytier-gui-macos-aarch64-test
          if-no-files-found: error
          retention-days: 7
          path: |
            ./artifacts/*
