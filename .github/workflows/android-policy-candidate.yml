name: EasyTier Android Policy Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - codex/profiling-beta

concurrency:
  group: android-policy-candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-aarch64-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          packages: 'build-tools;34.0.0 ndk;26.0.10792818 platform-tools platforms;android-34'

      - name: Setup Android environment
        run: |
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/ndk/26.0.10792818/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.0.10792818/" >> "$GITHUB_ENV"

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          target: aarch64-linux-android
          gui: false
          pnpm: true
          pnpm-build-filter: ''
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: android-policy-candidate-aarch64
          cache-targets: true
          cache-on-failure: true

      - name: Build pinned HEV static libraries
        env:
          HEV_SERVER_COMMIT: 97e74f1
        run: |
          set -euo pipefail
          hev_src="$RUNNER_TEMP/hev-socks5-server"
          hev_lib="$RUNNER_TEMP/hev-libs/aarch64-linux-android"
          toolchain="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          cc="$toolchain/aarch64-linux-android24-clang"
          git init "$hev_src"
          git -C "$hev_src" remote add origin https://github.com/lovitus/hev-socks5-server.git
          git -C "$hev_src" fetch --depth=1 origin "$HEV_SERVER_COMMIT"
          git -C "$hev_src" checkout --detach FETCH_HEAD
          git -C "$hev_src" submodule update --init --recursive --depth=1
          make -C "$hev_src" -j"$(nproc)" static \
            CC="$cc" \
            PP="$cc -E" \
            AR="$toolchain/llvm-ar" \
            STRIP="$toolchain/llvm-strip"
          mkdir -p "$hev_lib"
          cp "$hev_src/bin/libhev-socks5-server.a" "$hev_lib/"
          cp "$hev_src/third-part/yaml/bin/libyaml.a" "$hev_lib/"
          cp "$hev_src/third-part/hev-task-system/bin/libhev-task-system.a" "$hev_lib/"
          echo "HEV_SOCKS5_LIB_DIR=$hev_lib" >> "$GITHUB_ENV"
          echo "HEV_SERVER_COMMIT=$HEV_SERVER_COMMIT" >> "$GITHUB_ENV"

      - name: Restore stable candidate signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_POLICY_CANDIDATE_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_POLICY_CANDIDATE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_POLICY_CANDIDATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_B64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_PASSWORD"
          android_dir=easytier-gui/src-tauri/gen/android
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$android_dir/app/policy-candidate-keystore.jks"
          chmod 600 "$android_dir/app/policy-candidate-keystore.jks"
          cat > "$android_dir/keystore.properties" <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=easytier-policy-candidate
          storeFile=policy-candidate-keystore.jks
          EOF
          chmod 600 "$android_dir/keystore.properties"

      - name: Run focused persisted-selection tests
        run: |
          pnpm --dir easytier-web/frontend-lib codegen:proto
          pnpm --dir easytier-web/frontend-lib exec vitest run --config vitest.config.ts \
            tests/gui-persisted-selection.spec.ts \
            tests/remote-management-config.spec.ts

      - name: Build debug APK
        env:
          ORG_GRADLE_PROJECT_easytierPolicyCandidate: 'true'
        run: |
          cd easytier-gui
          pnpm tauri android build --debug --apk --target aarch64 --split-per-abi

      - name: Build captured-UID policy probe
        run: |
          cd easytier-gui/src-tauri/gen/android
          ./gradlew --no-daemon :policy-probe:assembleDebug :policy-probe:assembleDebugAndroidTest

      - name: Package exact candidate
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t apks < <(find easytier-gui/src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | sort)
          if [[ ${#apks[@]} -ne 1 ]]; then
            printf 'expected exactly one APK, found %s\n' "${#apks[@]}" >&2
            printf '%s\n' "${apks[@]}" >&2
            exit 1
          fi
          badging="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump badging "${apks[0]}")"
          grep -Fq "package: name='com.kkrainbow.easytier.policycandidate'" <<<"$badging"
          signer="$("$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --print-certs "${apks[0]}")"
          grep -Fq 'Signer #1 certificate SHA-256 digest: 14d2d885ce1bc361923a493210865f86390ffcd32eb2b555042bbd1a8b6c38e0' <<<"$signer"
          cp "${apks[0]}" artifacts/easytier-android-policy-candidate-aarch64.apk

          mapfile -t probe_apks < <(find easytier-gui/src-tauri/gen/android/policy-probe/build/outputs/apk/debug -type f -name '*.apk' | sort)
          if [[ ${#probe_apks[@]} -ne 1 ]]; then
            printf 'expected exactly one policy probe APK, found %s\n' "${#probe_apks[@]}" >&2
            printf '%s\n' "${probe_apks[@]}" >&2
            exit 1
          fi
          probe_badging="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump badging "${probe_apks[0]}")"
          grep -Fq "package: name='com.kkrainbow.easytier.policyprobe'" <<<"$probe_badging"
          grep -Fq 'application-debuggable' <<<"$probe_badging"
          if grep -Fq 'launchable-activity' <<<"$probe_badging"; then
            echo 'policy probe must not expose a launchable activity' >&2
            exit 1
          fi
          probe_permissions="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump permissions "${probe_apks[0]}")"
          grep -Fq "uses-permission: name='android.permission.INTERNET'" <<<"$probe_permissions"
          probe_manifest="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump xmltree "${probe_apks[0]}" AndroidManifest.xml)"
          if grep -Eq 'E: (activity|activity-alias|service|receiver|provider)' <<<"$probe_manifest"; then
            echo 'policy probe must not contain runtime components' >&2
            exit 1
          fi
          if grep -Eq 'A: android:hasCode.*0x0' <<<"$probe_manifest"; then
            echo 'policy probe target must remain code-capable for instrumentation attachment' >&2
            exit 1
          fi
          probe_signer="$("$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --print-certs "${probe_apks[0]}")"
          probe_signing_cert_sha256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' <<<"$probe_signer")"
          test -n "$probe_signing_cert_sha256"
          cp "${probe_apks[0]}" artifacts/easytier-android-policy-probe-debug.apk

          mapfile -t probe_runner_apks < <(find easytier-gui/src-tauri/gen/android/policy-probe/build/outputs/apk/androidTest/debug -type f -name '*.apk' | sort)
          if [[ ${#probe_runner_apks[@]} -ne 1 ]]; then
            printf 'expected exactly one policy probe runner APK, found %s\n' "${#probe_runner_apks[@]}" >&2
            printf '%s\n' "${probe_runner_apks[@]}" >&2
            exit 1
          fi
          probe_runner_badging="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump badging "${probe_runner_apks[0]}")"
          probe_runner_manifest="$("$ANDROID_HOME/build-tools/34.0.0/aapt" dump xmltree "${probe_runner_apks[0]}" AndroidManifest.xml)"
          if ! grep -Fq "package: name='com.kkrainbow.easytier.policyprobe.test'" <<<"$probe_runner_badging" \
            || ! grep -Fq 'E: instrumentation' <<<"$probe_runner_manifest" \
            || ! grep -Eq 'A: android:name.*="com\.kkrainbow\.easytier\.policyprobe\.PolicyProbeInstrumentation"' <<<"$probe_runner_manifest" \
            || ! grep -Eq 'A: android:targetPackage.*="com\.kkrainbow\.easytier\.policyprobe"' <<<"$probe_runner_manifest"; then
            echo 'policy probe runner package or instrumentation metadata mismatch' >&2
            printf '%s\n' '--- runner badging ---' "$probe_runner_badging" >&2
            printf '%s\n' '--- runner manifest ---' "$probe_runner_manifest" >&2
            exit 1
          fi
          if grep -Eq 'E: (activity|activity-alias|service|receiver|provider)' <<<"$probe_runner_manifest"; then
            echo 'policy probe runner must contain only instrumentation code' >&2
            exit 1
          fi
          probe_runner_signer="$("$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --print-certs "${probe_runner_apks[0]}")"
          probe_runner_signing_cert_sha256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' <<<"$probe_runner_signer")"
          if [[ "$probe_runner_signing_cert_sha256" != "$probe_signing_cert_sha256" ]]; then
            echo 'policy probe target and runner signer digests differ' >&2
            printf 'target=%s\nrunner=%s\n' "$probe_signing_cert_sha256" "$probe_runner_signing_cert_sha256" >&2
            exit 1
          fi
          cp "${probe_runner_apks[0]}" artifacts/easytier-android-policy-probe-runner-debug.apk

          cat > artifacts/BUILD_INFO.txt <<EOF
          commit_sha=$GITHUB_SHA
          workflow_run_id=$GITHUB_RUN_ID
          workflow_run_attempt=$GITHUB_RUN_ATTEMPT
          target=aarch64-linux-android
          profile=debug
          hev_server_commit=$HEV_SERVER_COMMIT
          application_id=com.kkrainbow.easytier.policycandidate
          signing_cert_sha256=14d2d885ce1bc361923a493210865f86390ffcd32eb2b555042bbd1a8b6c38e0
          probe_application_id=com.kkrainbow.easytier.policyprobe
          probe_signing_cert_sha256=$probe_signing_cert_sha256
          probe_runner_application_id=com.kkrainbow.easytier.policyprobe.test
          probe_runner_signing_cert_sha256=$probe_runner_signing_cert_sha256
          probe_instrumentation=com.kkrainbow.easytier.policyprobe.PolicyProbeInstrumentation
          probe_purpose=captured-uid-network-validation
          probe_protocols=tcp,tls
          probe_target_code_capable=true
          probe_has_runtime_components=false
          EOF
          (cd artifacts && sha256sum easytier-android-policy-candidate-aarch64.apk easytier-android-policy-probe-debug.apk easytier-android-policy-probe-runner-debug.apk BUILD_INFO.txt > SHA256SUMS.txt)

      - name: Remove candidate signing material
        if: always()
        run: |
          rm -f easytier-gui/src-tauri/gen/android/app/policy-candidate-keystore.jks
          git checkout -- easytier-gui/src-tauri/gen/android/keystore.properties

      - name: Upload candidate
        uses: actions/upload-artifact@v5
        with:
          name: easytier-android-policy-candidate-aarch64-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
