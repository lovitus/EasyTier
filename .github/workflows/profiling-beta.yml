name: EasyTier Linux Profiling Beta

on:
  workflow_dispatch:
    inputs:
      audit_comparator:
        description: Build a same-SHA optimized core without Leaf policy features
        required: false
        default: false
        type: boolean
  push:
    branches:
      - codex/profiling-beta

permissions:
  contents: write

concurrency:
  group: easytier-linux-profiling-beta
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl
  CARGO_PROFILE_RELEASE_DEBUG: "2"
  CARGO_PROFILE_RELEASE_STRIP: none
  RUSTFLAGS: -C force-frame-pointers=yes -C link-arg=-Wl,--build-id=sha1

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build symbolized Linux profiling binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          target: ${{ env.TARGET }}
          gui: false
          pnpm: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: profiling-beta
          shared-key: linux-x86_64-musl
          cache-targets: true
          cache-on-failure: true

      - name: Build pinned HEV SOCKS egress sidecar
        env:
          HEV_SERVER_COMMIT: 97e74f1068bd924e740032382cdc94ca83741ae6
        run: |
          set -euo pipefail
          hev_src="$RUNNER_TEMP/hev-socks5-server"
          hev_bin="$RUNNER_TEMP/hev-bin"
          git init "$hev_src"
          git -C "$hev_src" remote add origin https://github.com/lovitus/hev-socks5-server.git
          git -C "$hev_src" fetch --depth=1 origin "$HEV_SERVER_COMMIT"
          git -C "$hev_src" checkout --detach FETCH_HEAD
          git -C "$hev_src" submodule update --init --recursive --depth=1
          make -C "$hev_src" -j"$(nproc)" exec \
            CC=x86_64-linux-musl-gcc \
            PP='x86_64-linux-musl-gcc -E' \
            ENABLE_STATIC=1
          mkdir -p "$hev_bin"
          install -m 0755 "$hev_src/bin/hev-socks5-server" \
            "$hev_bin/easytier-hev-socks-egress"
          file "$hev_bin/easytier-hev-socks-egress" | tee hev-file-info.txt
          grep -q 'statically linked' hev-file-info.txt
          echo "HEV_EGRESS_BINARY=$hev_bin/easytier-hev-socks-egress" >> "$GITHUB_ENV"
          echo "HEV_SERVER_COMMIT=$HEV_SERVER_COMMIT" >> "$GITHUB_ENV"

      - name: Build optimized binaries with symbols
        run: |
          set -euo pipefail
          timeout 600 cargo test \
            --locked \
            --target "$TARGET" \
            --package easytier-policy \
            --lib \
            --no-default-features \
            --no-run
          timeout 900 cargo test \
            --locked \
            --target "$TARGET" \
            --package easytier-policy \
            --features leaf-inprocess
          timeout 600 cargo test \
            --locked \
            --target "$TARGET" \
            --package kcp-sys \
            dropping_one_stream_resets_both_connection_states
          timeout 600 cargo test \
            --locked \
            --target "$TARGET" \
            --package netstack-smoltcp \
            shutdown_completes_when_fin_is_committed
          easytier_test_json="$(mktemp)"
          set +e
          timeout 900 cargo test \
            --locked \
            --target "$TARGET" \
            --package easytier \
            --lib \
            --features leaf-policy-proxy \
            --no-run \
            --message-format=json-render-diagnostics > "$easytier_test_json"
          build_status=$?
          set -e
          if [[ $build_status -ne 0 ]]; then
            jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' \
              "$easytier_test_json"
            exit "$build_status"
          fi
          easytier_test_bin="$(
            jq -r '
              select(
                .reason == "compiler-artifact"
                and .target.name == "easytier"
                and .profile.test == true
                and (.target.kind | index("lib"))
              ) | .executable // empty
            ' "$easytier_test_json" | tail -n 1
          )"
          test -n "$easytier_test_bin" -a -x "$easytier_test_bin"
          for test_filter in \
            policy_proxy_config \
            network_config_roundtrips_policy_proxy_envelope \
            policy_toml_gets_a_default_socket_mark \
            uot_
          do
            timeout 600 "$easytier_test_bin" "$test_filter" --nocapture
          done
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.audit_comparator }}" == "true" ]]; then
            timeout 1800 cargo build \
              --locked \
              --release \
              --target "$TARGET" \
              --package easytier \
              --bin easytier-core \
              --features jemalloc
            audit_core="$RUNNER_TEMP/easytier-core-no-leaf"
            install -m 0755 "target/$TARGET/release/easytier-core" "$audit_core"
            echo "AUDIT_NO_LEAF_BINARY=$audit_core" >> "$GITHUB_ENV"
          fi
          timeout 1800 cargo build \
            --locked \
            --release \
            --target "$TARGET" \
            --package easytier-policy \
            --bin easytier-leaf-worker \
            --features leaf-worker
          timeout 1800 cargo build \
            --locked \
            --release \
            --target "$TARGET" \
            --package easytier \
            --bin easytier-core \
            --bin easytier-cli \
            --features jemalloc,leaf-policy-proxy

      - name: Verify profiling metadata
        run: |
          set -euo pipefail
          core="target/$TARGET/release/easytier-core"
          cli="target/$TARGET/release/easytier-cli"

          file "$core" "$cli" | tee profiling-file-info.txt
          readelf -n "$core" > profiling-build-id.txt
          readelf -S "$core" > profiling-sections.txt
          nm -n "$core" > profiling-symbols.txt

          grep -q "not stripped" profiling-file-info.txt
          grep -q "Build ID:" profiling-build-id.txt
          grep -qE '\.debug_info|\.debug_line' profiling-sections.txt
          test -s profiling-symbols.txt
          if [[ -n "${AUDIT_NO_LEAF_BINARY:-}" ]]; then
            file "$AUDIT_NO_LEAF_BINARY" | tee -a profiling-file-info.txt
            {
              echo "== no-Leaf audit comparator =="
              readelf -n "$AUDIT_NO_LEAF_BINARY"
            } >> profiling-build-id.txt
            grep -q "easytier-core-no-leaf:.*not stripped" profiling-file-info.txt
          fi

      - name: Package profiling bundle
        run: |
          set -euo pipefail
          bundle="easytier-profiling-beta-linux-x86_64-musl"
          mkdir -p "staging/$bundle" artifacts

          cp "target/$TARGET/release/easytier-core" "staging/$bundle/"
          cp "target/$TARGET/release/easytier-cli" "staging/$bundle/"
          cp "target/$TARGET/release/easytier-leaf-worker" "staging/$bundle/"
          cp "$HEV_EGRESS_BINARY" "staging/$bundle/"
          if [[ -n "${AUDIT_NO_LEAF_BINARY:-}" ]]; then
            cp "$AUDIT_NO_LEAF_BINARY" "staging/$bundle/"
          fi
          cp profiling-file-info.txt profiling-build-id.txt profiling-sections.txt \
            "staging/$bundle/"

          {
            echo "commit=$GITHUB_SHA"
            echo "ref=$GITHUB_REF_NAME"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "target=$TARGET"
            echo "hev_server_commit=$HEV_SERVER_COMMIT"
            echo "audit_comparator=${AUDIT_NO_LEAF_BINARY:+true}"
            rustc -Vv
            cargo -V
          } > "staging/$bundle/BUILD_INFO.txt"

          (
            cd "staging/$bundle"
            checksum_files=(
              easytier-core
              easytier-cli
              easytier-leaf-worker
              easytier-hev-socks-egress
            )
            if [[ -f easytier-core-no-leaf ]]; then
              checksum_files+=(easytier-core-no-leaf)
            fi
            sha256sum "${checksum_files[@]}" > SHA256SUMS.txt
          )

          tar -C staging -czf "artifacts/$bundle.tar.gz" "$bundle"
          (
            cd artifacts
            sha256sum "$bundle.tar.gz" > SHA256SUMS.txt
          )

          {
            echo "EasyTier rolling profiling beta"
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "Target: $TARGET"
            echo
            echo "This is an optimized, unstripped profiling build with DWARF and frame pointers."
            echo "It is not a production release."
          } > artifacts/RELEASE_NOTES.txt

          ls -lh artifacts

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: easytier-profiling-beta-linux-x86_64-musl
          if-no-files-found: error
          retention-days: 14
          path: artifacts/*

      - name: Roll profiling beta prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: profiling-beta
        run: |
          set -euo pipefail

          gh release delete "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force

          gh release create "$TAG" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "EasyTier Profiling Beta #$GITHUB_RUN_NUMBER" \
            --notes-file artifacts/RELEASE_NOTES.txt \
            --prerelease \
            --latest=false
