[package]
name = "easytier-policy"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"
publish = false

[dependencies]
arc-swap = "1.7"
cidr = "0.3"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
sha2 = "0.10.8"
thiserror = "1"
tokio = { version = "1", features = ["sync", "time", "rt", "net"] }
tracing = "0.1"
uuid = { version = "1", features = ["serde"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
